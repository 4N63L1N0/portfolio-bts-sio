<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Document projet — GLPI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#071022;--muted:#9aa6b2;--accent-from:#5eead4;--accent-to:#60a5fa}
    *{box-sizing:border-box}
    body{margin:0;padding:28px 20px;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:#e6eef6}
    .container{max-width:1100px;margin:0 auto}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));padding:18px;border-radius:14px;border:1px solid rgba(255,255,255,0.06)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .btn{display:inline-block;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
    .btn-primary{background:linear-gradient(90deg,var(--accent-from),var(--accent-to));color:#042033}
    .btn-ghost{background:transparent;border:1px solid rgba(255,255,255,0.16);color:var(--muted)}
    .pdf-viewer{width:100%;aspect-ratio:1/1.414;min-height:1200px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);overflow:hidden;background:#0c1424}
    .pdf-viewer iframe{width:100%;height:100%;border:0}
    .note{margin-top:10px;color:var(--muted);font-size:13px}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Document projet — GLPI</h1>
      <div class="actions">
        <a class="btn btn-primary" href="Epreuve E6-Projet 1 - GLPI.pdf" download>Télécharger le PDF</a>
        <a class="btn btn-ghost" href="epreuve-e6.html#projets">← Retour à l'épreuve E6</a>
      </div>
      <div class="pdf-viewer" aria-label="Visualiseur PDF GLPI">
        <iframe src="Epreuve E6-Projet 1 - GLPI.pdf"></iframe>
      </div>
      <div class="note">Place ton fichier ici: <code>Epreuve E6-Projet 1 - GLPI.pdf</code></div>
    </div>
  </div>
</body>
</html>
